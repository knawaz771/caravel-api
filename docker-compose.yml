services:
    app:
        build: .
        volumes:
            - .:/app
            - /app/vendor
        depends_on:
            mysql:
                condition: service_healthy
    mysql:
        image: mysql:8.0
        container_name: my-api-mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: my_api
            MYSQL_ROOT_PASSWORD: root
            MYSQL_USER: laravel
            MYSQL_PASSWORD: secret
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            timeout: 20s
            retries: 10
    nginx:
        image: nginx:latest
        ports:
            - "8080:80"
        volumes:
            - .:/app
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
